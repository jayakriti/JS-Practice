<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM | Last Part</title>
</head>
<body style="background-color: #212121; color: #ffffff; font-size: x-large;">
    <ul class="language">
        <li>JavaScript</li>
    </ul>
</body>
<script>
    function addLanguage(langName) {
        const list = document.createElement('li');
        list.innerHTML = `${langName}`;
        document.querySelector('.language').appendChild(list)
    }

    addLanguage("Python");
    addLanguage("JAVA");

    // ````````````````` OPTIMISED WAY TO ADD ELEMENT ````````````````` //
    function addOptiLanguage(langName) {
        const list = document.createElement('li')
        list.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(list)
    }

    addOptiLanguage("HTML")
    addOptiLanguage("CSS")
    
// ````````````````` EDIT ````````````````` //

const secondLang = document.querySelector('li:nth-child(2)')
//secondLang.innerHTML = "Ruby"

// 2nd Approach
const newli = document.createElement('li')
newli.textContent = "Ruby"
secondLang.replaceWith(newli)

const firstLang = document.querySelector('li:first-child')

firstLang.outerHTML = '<li>Uuu La La La</li>'

// ````````````````` REMOVE ````````````````` //
const lastLang = document.querySelector('li:last-child')
lastLang.remove()
</script>
</html>
