<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM | Last Part</title>
</head>
<body style="background-color: #212121; color: #ffffff; font-size: x-large;">
    <ul class="language">
        <li>JavaScript</li>
    </ul>
</body>
<script>
    function addLanguage(langName) {
        const list = document.createElement('li');
        list.innerHTML = `${langName}`;
        document.querySelector('.language').appendChild(list)
    }

    addLanguage("Python");
    addLanguage("JAVA");
</script>
</html>
